name: myhome

services:
  db:
    container_name: database
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: myhome_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "3276"
      # PGPORT: "5433"
    ports:
      - "5433:5432"
    # expose:
    # - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: api
    build:
      context: ../api
      dockerfile: ../docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../api/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata apps/users/fixtures/data.json &&
             python manage.py loaddata apps/technicians/fixtures/data.json &&
             python manage.py loaddata apps/residences/fixtures/data.json &&
             python manage.py loaddata apps/tenants/fixtures/data.json &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:


# 1) go to -> /docker
# 2) docker compose -f docker-compose.yml up --build